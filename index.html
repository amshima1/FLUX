  <style>
        :root { --cyan: #00f0ff; --purple: #a855f7; --green: #39ff14; }
        body { font-family: 'DM Sans', sans-serif; }
        .font-orbitron { font-family: 'Orbitron', sans-serif; }
        .glow-cyan { text-shadow: 0 0 20px rgba(0,240,255,0.5); }
        .glow-border { box-shadow: 0 0 15px rgba(0,240,255,0.3), inset 0 0 15px rgba(0,240,255,0.05); }

        .card-hover:hover { transform: translateY(-4px); box-shadow: 0 0 25px rgba(0,240,255,0.3); }
        @keyframes fadeUp { from { opacity:0; transform:translateY(30px); } to { opacity:1; transform:translateY(0); } }

        .anim-2 { animation: fadeUp 0.6s 0.3s both; }
        .anim-3 { animation: fadeUp 0.6s 0.5s both; }
        .anim-4 { animation: fadeUp 0.6s 0.7s both; }
    </style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>

     </div>
    </div>
   </div>
  </section><!-- Insights -->

       <p data-template-id="insight-2-text" class="canva-text opacity-70 text-sm leading-relaxed"></p>
