<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FLUX Fashion House</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="menu" onclick="toggleMenu()">☰</div>
  <div class="logo">FLUX</div>
  <div class="cart">🛒</div>
</header>

<!-- MOBILE NAV -->
<nav id="nav">
  <a href="#">Home</a>
  <a href="#">Shop</a>
  <a href="#">Custom</a>
  <a href="#">Contact</a>
</nav>

<!-- SEARCH -->
<div class="search-bar">
  <input type="text" placeholder="Search for products...">
  <span>🔍</span>
</div>

<!-- HERO -->
<section class="hero">
  <h1>Redefine Your Style</h1>
  <p>Premium Fashion for Bold Individuals</p>
  <button>Shop Now</button>
</section>

<!-- PRODUCTS -->
<section class="products">
  <h2>Featured Products</h2>

  <div class="product-grid">

    <div class="product">
      <img src="https://via.placeholder.com/300">
      <h3>Street Hoodie</h3>
      <p>$25</p>
      <button>Order</button>
    </div>

    <div class="product">
      <img src="https://via.placeholder.com/300">
      <h3>Luxury Jacket</h3>
      <p>$50</p>
      <button>Order</button>
    </div>

    <div class="product">
      <img src="https://via.placeholder.com/300">
      <h3>Casual Tee</h3>
      <p>$15</p>
      <button>Order</button>
    </div>

  </div>
</section>

<!-- CUSTOM -->
<section class="custom">
  <h2>Custom Design</h2>
  <p>Send us your design ideas and we’ll bring them to life.</p>
  <button>Start Custom Order</button>
</section>

<!-- FOOTER -->
<footer>
  <p>© 2026 FLUX Fashion House</p>
</footer>

<script src="script.js"></script>
</body>
</html>
