<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLUX | Fashion House</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="side-menu" id="sideMenu">
        <i class="fa-solid fa-xmark close-menu" id="closeBtn"></i>
        <nav>
            <a href="#">Home</a>
            <a href="#">Shop</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </nav>
    </div>

    <header id="mainHeader">
        <div class="top-nav">
            <i class="fa-solid fa-bars hamburger" id="menuBtn"></i>
            <h1 class="logo">FLUX</h1>
            <div class="header-icons">
                <i class="fa-solid fa-heart wishlist-icon"></i>
                <i class="fa-solid fa-bag-shopping cart"></i>
            </div>
        </div>
        
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Search Collection...">
            <i class="fa-solid fa-magnifying-glass"></i>
        </div>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h2>DEFINE YOUR STYLE</h2>
            <p>Premium fashion for bold individuals</p>
            <div class="hero-btns">
                <a href="#" class="btn-primary">Shop Now</a>
                <a href="#" class="btn-outline">View Collection</a>
            </div>
        </div>
    </section>

    <section class="featured">
        <h3>Featured Collection</h3>
        <div class="grid">
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
        </div>
    </section>

    <a href="https://wa.me/yournumber" class="whatsapp-btn">
        <i class="fa-brands fa-whatsapp"></i>
    </a>

    <script src="script.js"></script>
</body>
</html>
