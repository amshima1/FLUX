<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FLUX Fashion Store</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="logo">FLUX</div>

  <input type="text" id="search" placeholder="Search fashion...">

  <nav>
    <button onclick="filterProducts('all')">All</button>
    <button onclick="filterProducts('dress')">Dresses</button>
    <button onclick="filterProducts('kaftan')">Kaftan</button>
    <button onclick="filterProducts('luxury')">Luxury</button>
  </nav>

  <div class="cart" onclick="openCart()">
    🛒 <span id="cart-count">0</span>
  </div>
</header>

<!-- HERO -->
<section class="hero">
  <h1>Luxury African Fashion</h1>
  <p>Premium styles crafted for elegance</p>
</section>

<!-- PRODUCTS -->
<section class="products" id="product-list"></section>

<!-- CART MODAL -->
<div id="cart-modal" class="modal">
  <div class="modal-content">
    <span onclick="closeCart()" class="close">&times;</span>
    <h2>Your Cart</h2>
    <div id="cart-items"></div>
    <h3 id="total"></h3>
    <button onclick="checkout()">Checkout</button>
  </div>
</div>

<!-- CHECKOUT -->
<div id="checkout" class="modal">
  <div class="modal-content">
    <span onclick="closeCheckout()" class="close">&times;</span>
    <h2>Checkout</h2>
    <input placeholder="Name">
    <input placeholder="Address">
    <button onclick="placeOrder()">Place Order</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
