<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FLUX Fashion House</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>FLUX</h1>
  <nav id="nav">
    <a href="#">Home</a>
    <a href="#">Shop</a>
    <a href="#">Custom</a>
    <a href="#">Contact</a>
  </nav>
  <div class="menu" onclick="toggleMenu()">☰</div>
</header>

<section class="hero">
  <h2>Redefine Your Style</h2>
  <p>Premium Fashion for Bold Individuals</p>
  <button onclick="shopNow()">Shop Now</button>
</section>

<section class="products">
  <h2>Featured Products</h2>

  <div class="product">
    <img src="https://via.placeholder.com/300" alt="">
    <h3>Street Hoodie</h3>
    <p>$25</p>
    <button onclick="order('Street Hoodie')">Order</button>
  </div>

  <div class="product">
    <img src="https://via.placeholder.com/300" alt="">
    <h3>Luxury Jacket</h3>
    <p>$50</p>
    <button onclick="order('Luxury Jacket')">Order</button>
  </div>

  <div class="product">
    <img src="https://via.placeholder.com/300" alt="">
    <h3>Casual Tee</h3>
    <p>$15</p>
    <button onclick="order('Casual Tee')">Order</button>
  </div>

</section>

<section class="custom">
  <h2>Custom Design</h2>
  <p>Send us your design ideas and we’ll bring them to life.</p>
  <button onclick="customOrder()">Start Custom Order</button>
</section>

<footer>
  <p>© 2026 FLUX Fashion House</p>
</footer>

<script src="script.js"></script>
</body>
</html>
