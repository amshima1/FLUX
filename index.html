<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FLUX Fashion House</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Icons -->
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body class="bg-black text-white font-body">

<!-- NAVBAR -->
<nav class="fixed w-full bg-black/90 backdrop-blur z-50 px-6 py-4 flex justify-between items-center">
  <h1 class="font-display text-3xl">FLUX</h1>
  <div class="flex gap-6 text-sm">
    <a href="#">HOME</a>
    <a href="#shop">SHOP</a>
  </div>
</nav>

<!-- HERO -->
<section class="h-screen flex flex-col justify-center items-center text-center px-6">
  <h1 class="font-display text-6xl md:text-8xl">DEFINE YOUR STYLE</h1>
  <p class="opacity-60 mt-4">Premium fashion for bold individuals</p>
  <button onclick="scrollToShop()" class="mt-6 px-6 py-3 bg-yellow-500 text-black font-bold">SHOP NOW</button>
</section>

<!-- SHOP -->
<section id="shop" class="py-20 px-6">
  <h2 class="text-4xl font-display mb-8 text-center">SHOP</h2>
  <div id="products" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
</section>

<!-- CART -->
<div id="cart" class="fixed right-0 top-0 w-80 h-full bg-gray-900 p-6 hidden">
  <h2 class="text-2xl mb-4">Cart</h2>
  <div id="cart-items"></div>
  <p class="mt-4">Total: $<span id="total">0</span></p>
  <button onclick="checkout()" class="mt-4 w-full bg-yellow-500 py-2 text-black">Checkout</button>
</div>

<button onclick="toggleCart()" class="fixed bottom-6 right-6 bg-yellow-500 w-14 h-14 rounded-full text-black">🛒</button>

<!-- JS -->
<script src="script.js"></script>
</body>
</html>
