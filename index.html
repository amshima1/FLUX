<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FLUX PRO MAX</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<header>
  <div class="logo">FLUX PRO MAX</div>

  <div class="hamburger" onclick="toggleMenu()">
    <i class="fa fa-bars"></i>
  </div>

  <nav id="nav-menu">
    <button onclick="filter('all')">All</button>
    <button onclick="filter('dress')">Dresses</button>
    <button onclick="filter('luxury')">Luxury</button>
    <button onclick="openAdmin()">Admin</button>
  </nav>

  <input id="search" placeholder="Search...">

  <div class="cart" onclick="openCart()">
    🛒 <span id="cart-count">0</span>
  </div>
</header>

<!-- HERO -->
<section class="hero">
  <h1>FLUX LUXURY FASHION</h1>
  <p>Bold. Clean. Premium.</p>
</section>

<!-- PRODUCTS -->
<section id="product-list" class="products"></section>

<!-- PRODUCT VIEW -->
<div id="product-modal" class="modal">
  <div class="modal-content large">
    <span onclick="closeProduct()" class="close">&times;</span>
    <div id="product-view"></div>
  </div>
</div>

<!-- CART -->
<div id="cart-modal" class="modal">
  <div class="modal-content">
    <span onclick="closeCart()" class="close">&times;</span>
    <h2>Cart</h2>
    <div id="cart-items"></div>
    <h3 id="total"></h3>
  </div>
</div>

<!-- ADMIN -->
<div id="admin-modal" class="modal">
  <div class="modal-content">
    <span onclick="closeAdmin()" class="close">&times;</span>
    <h2>Admin Panel</h2>

    <input id="name" placeholder="Product Name">
    <input id="price" placeholder="Price">
    <input id="img" placeholder="Image URL">

    <button onclick="addProduct()">Add Product</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
