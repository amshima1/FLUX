<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FLUX Fashion Store</title>
<link rel="stylesheet" href="style.css">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<header>
  <div class="logo">FLUX</div>

  <div class="hamburger" onclick="toggleMenu()">
    <i class="fa fa-bars"></i>
  </div>

  <nav id="nav-menu">
    <button onclick="filterProducts('all')">All</button>
    <button onclick="filterProducts('dress')">Dresses</button>
    <button onclick="filterProducts('kaftan')">Kaftan</button>
    <button onclick="filterProducts('luxury')">Luxury</button>
  </nav>

  <input type="text" id="search" placeholder="Search fashion...">

  <div class="cart" onclick="openCart()">
    🛒 <span id="cart-count">0</span>
  </div>
</header>

<!-- HERO -->
<section class="hero">
  <div class="hero-text">
    <h1>Luxury Fashion Store</h1>
    <p>Premium African & Modern Designer Wear</p>
    <button onclick="filterProducts('all')">Shop Now</button>
  </div>
</section>

<!-- PRODUCTS -->
<section class="products" id="product-list"></section>

<!-- CART -->
<div id="cart-modal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeCart()">&times;</span>
    <h2>Your Cart</h2>
    <div id="cart-items"></div>
    <h3 id="total"></h3>
    <button onclick="checkout()">Checkout</button>
  </div>
</div>

<!-- CHECKOUT -->
<div id="checkout-modal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeCheckout()">&times;</span>
    <h2>Checkout</h2>
    <input placeholder="Full Name">
    <input placeholder="Address">
    <input placeholder="Phone Number">
    <button onclick="placeOrder()">Place Order</button>
  </div>
</div>

<!-- WHATSAPP -->
<a href="https://wa.me/234XXXXXXXXXX" class="whatsapp" target="_blank">
  <i class="fa-brands fa-whatsapp"></i>
</a>

<!-- FOOTER -->
<footer>
  <h3>FLUX Fashion Store</h3>

  <div class="socials">
    <a href="#"><i class="fa-brands fa-facebook"></i></a>
    <a href="#"><i class="fa-brands fa-instagram"></i></a>
    <a href="#"><i class="fa-brands fa-x-twitter"></i></a>
    <a href="#"><i class="fa-brands fa-tiktok"></i></a>
  </div>

  <p>© 2026 FLUX. All Rights Reserved.</p>
</footer>

<script src="script.js"></script>
</body>
</html>
